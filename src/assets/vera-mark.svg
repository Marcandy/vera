        <path d="M 64 70 L 102 32" fill="none" stroke="#1e2b4a" stroke-opacity="0.4" stroke-width="11" stroke-linecap="round"/>
        <circle cx="64" cy="70" r="7" fill="#1e2b4a" fill-opacity="0.4"/>

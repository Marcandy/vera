        <path d="M 64 70 L 102 32" fill="none" stroke="#820263" stroke-opacity="0.3" stroke-width="11" stroke-linecap="round"/>
        <circle cx="64" cy="70" r="7" fill="#820263" fill-opacity="0.3"/>
